<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">

  <!-- Flat gear color -->
  <g transform="translate(128 128)" fill="#8a8f96">

    <!-- Gear body -->
    <circle r="78"/>

    <!-- Teeth built to actually extend from root (78) to outer (116) -->
    <g>
      <!-- tooth shape is centered radially and extends outward -->
      <rect x="-12" y="-116" width="24" height="44" rx="4"
        transform="rotate(0)"/>
      <rect x="-12" y="-116" width="24" height="44" rx="4"
        transform="rotate(36)"/>
      <rect x="-12" y="-116" width="24" height="44" rx="4"
        transform="rotate(72)"/>
      <rect x="-12" y="-116" width="24" height="44" rx="4"
        transform="rotate(108)"/>
      <rect x="-12" y="-116" width="24" height="44" rx="4"
        transform="rotate(144)"/>
      <rect x="-12" y="-116" width="24" height="44" rx="4"
        transform="rotate(180)"/>
      <rect x="-12" y="-116" width="24" height="44" rx="4"
        transform="rotate(216)"/>
      <rect x="-12" y="-116" width="24" height="44" rx="4"
        transform="rotate(252)"/>
      <rect x="-12" y="-116" width="24" height="44" rx="4"
        transform="rotate(288)"/>
      <rect x="-12" y="-116" width="24" height="44" rx="4"
        transform="rotate(324)"/>
    </g>

    <!-- Inner support ring -->
    <circle r="54" fill="none" stroke="#8a8f96" stroke-width="14"/>

  </g>

  <!-- Center hole -->
  <circle cx="128" cy="128" r="30" fill="#ffffff"/>

</svg>
