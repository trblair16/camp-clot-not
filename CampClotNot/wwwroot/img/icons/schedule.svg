<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Calendar rings -->
  <rect x="7" y="2" width="2.5" height="3" rx="1"
        fill="#555555"
        stroke="#1A1A1A"
        stroke-width="1.5"/>
  <rect x="14.5" y="2" width="2.5" height="3" rx="1"
        fill="#555555"
        stroke="#1A1A1A"
        stroke-width="1.5"/>

  <!-- Calendar body -->
  <rect x="3" y="4" width="18" height="17" rx="2"
        fill="#FFFDF0"
        stroke="#1A1A1A"
        stroke-width="1.75"/>

  <!-- Header bar -->
  <rect x="3" y="4" width="18" height="5" rx="2"
        fill="#2980B9"
        stroke="#1A1A1A"
        stroke-width="1.75"/>

  <!-- Day dots -->
  <circle cx="8" cy="12" r="1.4" fill="#F5C800"/>
  <circle cx="16" cy="12" r="1.4" fill="#2ECC71"/>

  <circle cx="8" cy="15.5" r="1.4" fill="#E74C3C"/>
  <circle cx="16" cy="15.5" r="1.4" fill="#F5C800"/>

  <circle cx="8" cy="19" r="1.4" fill="#2ECC71"/>
  <circle cx="16" cy="19" r="1.4" fill="#E74C3C"/>
</svg>
