name: .NET Build Check

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore CampClotNot/CampClotNot.csproj

      - name: Build
        run: dotnet build CampClotNot/CampClotNot.csproj --no-restore --configuration Release
